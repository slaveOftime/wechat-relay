name: CI

on:
  pull_request:
    paths:
      - 'WeChatRelay/**.*'
      - '.github/workflows/ci.yml'
  push:
    branches:
      - main
    paths:
      - 'WeChatRelay/**.*'
      - '.github/workflows/ci.yml'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build .\WeChatRelay\WeChatRelay.csproj --configuration Release --no-restore

      - name: Pack
        run: dotnet pack .\WeChatRelay\WeChatRelay.csproj --configuration Release --no-build --output ./artifacts/packages -p:ContinuousIntegrationBuild=true
